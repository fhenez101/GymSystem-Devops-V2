services:
  mysql:
    image: mysql:8.0
    container_name: gymsystem-mysql
    environment:
      MYSQL_DATABASE: gymsystem
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - gymsystem_mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: gymsystem-app
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gymsystem?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  gymsystem_mysql_data: