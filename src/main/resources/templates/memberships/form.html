<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Membresía</title>
</head>
<body>

<h1>Asignar Membresía</h1>

<form th:action="@{/memberships}" th:object="${membership}" method="post">

    <label>Cliente:</label>
    <select name="clientId">
        <option th:each="c : ${clients}"
                th:value="${c.id}"
                th:text="${c.fullName}">
        </option>
    </select>
    <br>

    <label>Plan:</label>
    <input type="text" th:field="*{planName}" />
    <br>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{price}" />
    <br>

    <label>Fecha inicio:</label>
    <input type="date" th:field="*{startDate}" />
    <br>

    <label>Fecha fin:</label>
    <input type="date" th:field="*{endDate}" />
    <br>

    <label>Estado:</label>
    <select th:field="*{status}">
        <option value="ACTIVE">ACTIVO</option>
        <option value="EXPIRED">VENCIDO</option>
    </select>
    <br><br>

    <button type="submit">Guardar</button>

</form>

<a href="/memberships/list">Ver membresías</a>

</body>
</html>
