<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/base :: head('Membresías')"></head>
<body th:replace="layout/base :: layout(~{::content})">

<div th:fragment="content">

    <h1 class="mb-4">Membresías</h1>

    <div th:if="${!expiredMemberships.isEmpty()}" class="alert alert-danger">
        <strong>Membresías vencidas:</strong>
        <ul class="mb-0">
            <li th:each="m : ${expiredMemberships}"
                th:text="${m.client.fullName + ' - ' + m.planName + ' (venció: ' + m.endDate + ')'}">
            </li>
        </ul>
    </div>

    <div th:if="${!endingToday.isEmpty()}" class="alert alert-warning">
        <strong>Vencen hoy:</strong>
        <ul class="mb-0">
            <li th:each="m : ${endingToday}"
                th:text="${m.client.fullName + ' - ' + m.planName + ' (vence hoy: ' + m.endDate + ')'}">
            </li>
        </ul>
    </div>

    <div th:if="${!endingSoon.isEmpty()}" class="alert alert-info">
        <strong>Próximas a vencer:</strong>
        <ul class="mb-0">
            <li th:each="m : ${endingSoon}"
                th:text="${m.client.fullName + ' - ' + m.planName + ' (vence: ' + m.endDate + ')'}">
            </li>
        </ul>
    </div>

    <button class="btn btn-primary mb-3"
            data-bs-toggle="modal"
            data-bs-target="#membershipModal"
            onclick="resetMembershipForm()">
        Nueva Membresía
    </button>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Cliente</th>
            <th>Plan</th>
            <th>Precio</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${memberships}">
            <td th:text="${m.client.fullName}"></td>
            <td th:text="${m.planName}"></td>
            <td th:text="${m.price}"></td>
            <td th:text="${m.startDate}"></td>
            <td th:text="${m.endDate}"></td>
            <td th:text="${m.status}"></td>
            <td>
                <button type="button"
                        class="btn btn-warning btn-sm"
                        data-bs-toggle="modal"
                        data-bs-target="#membershipModal"
                        th:attr="data-id=${m.id},
                                 data-clientid=${m.client.id},
                                 data-planname=${m.planName},
                                 data-price=${m.price},
                                 data-startdate=${m.startDate},
                                 data-enddate=${m.endDate},
                                 data-status=${m.status}"
                        onclick="loadMembershipData(this)">
                    Editar
                </button>

                <a th:href="@{/memberships/delete/{id}(id=${m.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar esta membresía?');">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="modal fade" id="membershipModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="membershipModalLabel">Nueva Membresía</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/memberships}" th:object="${membership}" method="post">
                    <div class="modal-body">

                        <input type="hidden" th:field="*{id}" id="membershipId"/>

                        <div class="mb-3">
                            <label class="form-label">Cliente</label>
                            <select name="clientId" class="form-select" id="clientId" required>
                                <option value="">Seleccione un cliente</option>
                                <option th:each="c : ${clients}"
                                        th:value="${c.id}"
                                        th:text="${c.fullName}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Plan</label>
                            <input type="text" th:field="*{planName}" class="form-control" id="planName" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" id="price" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha inicio</label>
                            <input type="date" th:field="*{startDate}" class="form-control" id="startDate" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha fin</label>
                            <input type="date" th:field="*{endDate}" class="form-control" id="endDate" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <select th:field="*{status}" class="form-select" id="status" required>
                                <option value="ACTIVE">ACTIVO</option>
                                <option value="EXPIRED">VENCIDO</option>
                            </select>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Guardar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function resetMembershipForm() {
            document.getElementById("membershipModalLabel").innerText = "Nueva Membresía";
            document.getElementById("membershipId").value = "";
            document.getElementById("clientId").value = "";
            document.getElementById("planName").value = "";
            document.getElementById("price").value = "";
            document.getElementById("startDate").value = "";
            document.getElementById("endDate").value = "";
            document.getElementById("status").value = "ACTIVE";
        }

        function loadMembershipData(button) {
            document.getElementById("membershipModalLabel").innerText = "Editar Membresía";
            document.getElementById("membershipId").value = button.getAttribute("data-id");
            document.getElementById("clientId").value = button.getAttribute("data-clientid");
            document.getElementById("planName").value = button.getAttribute("data-planname");
            document.getElementById("price").value = button.getAttribute("data-price");
            document.getElementById("startDate").value = button.getAttribute("data-startdate");
            document.getElementById("endDate").value = button.getAttribute("data-enddate");
            document.getElementById("status").value = button.getAttribute("data-status");
        }
    </script>

</div>

</body>
</html>
