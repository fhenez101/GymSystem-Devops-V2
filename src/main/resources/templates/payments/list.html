<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/base :: head('Pagos')"></head>
<body th:replace="layout/base :: layout(~{::content})">

<div th:fragment="content">

    <h1 class="mb-1">Pagos</h1>
    <p class="text-muted mb-3">Gestiona los pagos registrados del gimnasio</p>

    <button class="btn btn-primary mb-3"
            data-bs-toggle="modal"
            data-bs-target="#paymentModal"
            onclick="resetPaymentForm()">
        Nuevo Pago
    </button>

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Cliente</th>
                        <th>Monto</th>
                        <th>Fecha</th>
                        <th>Método</th>
                        <th>Descripción</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(payments)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            No hay pagos registrados
                        </td>
                    </tr>

                    <tr th:each="payment : ${payments}">
                        <td th:text="${payment.client.fullName}"></td>
                        <td th:text="${payment.amount}"></td>
                        <td th:text="${payment.paymentDate}"></td>
                        <td th:text="${payment.paymentMethod}"></td>
                        <td th:text="${payment.description}"></td>
                        <td class="text-center">
                            <button type="button"
                                    class="btn btn-warning btn-sm me-1"
                                    data-bs-toggle="modal"
                                    data-bs-target="#paymentModal"
                                    th:attr="data-id=${payment.id},
                                             data-clientid=${payment.client.id},
                                             data-amount=${payment.amount},
                                             data-paymentdate=${payment.paymentDate},
                                             data-paymentmethod=${payment.paymentMethod},
                                             data-description=${payment.description}"
                                    onclick="loadPaymentData(this)">
                                Editar
                            </button>

                            <a th:href="@{/payments/delete/{id}(id=${payment.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Seguro que deseas eliminar este pago?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content shadow">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="paymentModalLabel">Nuevo Pago</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/payments}" th:object="${payment}" method="post">
                    <div class="modal-body">

                        <input type="hidden" th:field="*{id}" id="paymentId"/>

                        <div class="mb-3">
                            <label class="form-label">Cliente</label>
                            <select name="clientId" class="form-select" id="clientId" required>
                                <option value="">Seleccione un cliente</option>
                                <option th:each="c : ${clients}"
                                        th:value="${c.id}"
                                        th:text="${c.fullName}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Monto</label>
                            <input type="number"
                                   step="0.01"
                                   th:field="*{amount}"
                                   class="form-control"
                                   id="amount"
                                   required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha de pago</label>
                            <input type="date"
                                   th:field="*{paymentDate}"
                                   class="form-control"
                                   id="paymentDate"
                                   required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Método de pago</label>
                            <input type="text"
                                   th:field="*{paymentMethod}"
                                   class="form-control"
                                   id="paymentMethod"
                                   placeholder="SINPE, efectivo, tarjeta..."/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <input type="text"
                                   th:field="*{description}"
                                   class="form-control"
                                   id="description"
                                   placeholder="Detalle opcional"/>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">Guardar</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function resetPaymentForm() {
            document.getElementById("paymentModalLabel").innerText = "Nuevo Pago";
            document.getElementById("paymentId").value = "";
            document.getElementById("clientId").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("paymentDate").value = "";
            document.getElementById("paymentMethod").value = "";
            document.getElementById("description").value = "";
        }

        function loadPaymentData(button) {
            document.getElementById("paymentModalLabel").innerText = "Editar Pago";
            document.getElementById("paymentId").value = button.getAttribute("data-id");
            document.getElementById("clientId").value = button.getAttribute("data-clientid");
            document.getElementById("amount").value = button.getAttribute("data-amount");
            document.getElementById("paymentDate").value = button.getAttribute("data-paymentdate");
            document.getElementById("paymentMethod").value = button.getAttribute("data-paymentmethod");
            document.getElementById("description").value = button.getAttribute("data-description");
        }
    </script>

</div>

</body>
</html>
