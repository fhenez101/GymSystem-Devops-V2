<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h1>Registrar Pago</h1>

<form th:action="@{/payments}" th:object="${payment}" method="post">

    <div class="mb-3">
        <label>Cliente</label>
        <select name="clientId" class="form-control">
            <option th:each="c : ${clients}"
                    th:value="${c.id}"
                    th:text="${c.fullName}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label>Monto</label>
        <input type="number" step="0.01" th:field="*{amount}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Fecha</label>
        <input type="date" th:field="*{paymentDate}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Método</label>
        <input type="text" th:field="*{paymentMethod}" class="form-control"/>
    </div>

    <button class="btn btn-success">Guardar</button>

</form>

</body>
</html>
