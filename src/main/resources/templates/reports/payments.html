<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/base :: head('Reporte de Pagos')"></head>
<body th:replace="layout/base :: layout(~{::content})">

<div th:fragment="content">

    <h1 class="mb-4">Reporte de Pagos</h1>

    <form method="get" th:action="@{/reports/payments}" class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="form-label">Fecha inicio</label>
            <input type="date" name="startDate" class="form-control" th:value="${startDate}">
        </div>

        <div class="col-md-4">
            <label class="form-label">Fecha fin</label>
            <input type="date" name="endDate" class="form-control" th:value="${endDate}">
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-primary">Filtrar</button>
        </div>
    </form>

    <div class="alert alert-success">
        <strong>Ingreso del rango:</strong>
        <span th:text="${incomeBetween}"></span>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
        <tr>
            <th>Cliente</th>
            <th>Monto</th>
            <th>Fecha</th>
            <th>Método</th>
            <th>Descripción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.client.fullName}"></td>
            <td th:text="${p.amount}"></td>
            <td th:text="${p.paymentDate}"></td>
            <td th:text="${p.paymentMethod}"></td>
            <td th:text="${p.description}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
